<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dyslexia Learning – Voice Practice</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f6fb;
      padding: 32px;
      color: #1f2937;
    }

    h1 {
      font-weight: 600;
      margin-bottom: 10px;
    }

    .box {
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      max-width: 820px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    label {
      margin-top: 18px;
      display: block;
      font-weight: 600;
      font-size: 16px;
    }

    input, select, button {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
    }

    button {
      margin-top: 16px;
      cursor: pointer;
      background: #4f46e5;
      color: #fff;
      border: none;
    }

    button.secondary {
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
    }

    img {
      margin-top: 12px;
      max-width: 180px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      display: none;
    }

    .output {
      margin-top: 20px;
      padding: 16px;
      background: #f1f5f9;
      border-radius: 10px;
      white-space: pre-line;
      font-size: 15px;
      line-height: 1.7;
    }

    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: #6b7280;
    }

    .error {
      color: #b91c1c;
      font-weight: 600;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🎤 Word Practice (Dyslexia-Friendly)</h1>

<div class="box">

  <label>🔑 JWT Token</label>
  <input id="tokenInput" placeholder="Paste JWT token here" />
  <button onclick="connectBackend()">Connect</button>

  <label>📚 Level</label>
  <select id="levelSelect" onchange="loadWords()"></select>

  <label>📝 Word</label>
  <select id="wordSelect" onchange="onWordSelected()"></select>

  <label>🖼 Visual Hint</label>
  <img id="wordImage" />

  <label>⏱ Speaking Pace</label>
  <select id="paceMode" onchange="toggleCustomPace()">
    <option value="slow">Slow</option>
    <option value="medium" selected>Medium</option>
    <option value="fast">Fast</option>
    <option value="custom">Custom</option>
  </select>

  <input id="customPace" type="number" min="40" max="200" value="80" disabled />

  <button class="secondary" onclick="playTTS()">🔊 Hear the word</button>
  <button onclick="startSTT()">🎙 Speak the word</button>
  <div class="hint">
    Say the word slowly and stretch the sound.<br>
    Example: <b>cat → caaaat</b>, <b>book → boooook</b>
  </div>

  <button onclick="evaluatePronunciation()">🧪 Check Pronunciation</button>

  <div id="output" class="output"></div>
  <div id="error" class="error"></div>

</div>

<script>
const API = "http://127.0.0.1:8000";
const STATIC = "https://dyslexia-static-assets.onrender.com";

let AUTH = {};
let spokenText = "";

/* =========================
   🔥 CACHE LAYER
========================= */

let levelCache = null;        // stores levels
let wordsCache = {};          // stores words per level

function resetCache() {
  levelCache = null;
  wordsCache = {};
}

/* ---------- Helpers ---------- */

function normalizeSpoken(text) {
  if (!text) return "";

  text = text.toLowerCase().replace(/[^a-z\s]/g, "").trim();
  const parts = text.split(/\s+/);

  if (parts.length > 1 && parts.every(p => p.length === 1)) {
    return parts.join("");
  }

  return parts[0] || "";
}

function clearUI() {
  error.innerText = "";
}

/* =========================
   🚀 BACKEND
========================= */

async function connectBackend() {
  clearUI();
  const token = tokenInput.value.trim();
  if (!token) return error.innerText = "JWT token required";

  AUTH = { Authorization: "Bearer " + token };

  resetCache(); // 🔥 important

  await loadLevels();
}

async function loadLevels() {

  // 🔥 Use cache if exists
  if (levelCache) {
    renderLevels(levelCache);
    return;
  }

  const res = await fetch(`${API}/learning/levels`, { headers: AUTH });
  const levels = await res.json();

  levelCache = levels; // cache it

  renderLevels(levels);
}

function renderLevels(levels) {
  levelSelect.innerHTML = "";

  levels.forEach(l => {
    const o = document.createElement("option");
    o.value = l.id;
    o.textContent =
      `Level ${l.id} – ${l.name} (${l.mastered_percentage || 0}% mastered)`;
    levelSelect.appendChild(o);
  });

  loadWords();
}

async function loadWords() {
  const levelId = levelSelect.value;

  // 🔥 If cached, reuse
  if (wordsCache[levelId]) {
    renderWords(wordsCache[levelId]);
    return;
  }

  const res = await fetch(
    `${API}/learning/levels/${levelId}/words`,
    { headers: AUTH }
  );

  if (!res.ok) {
    const err = await res.json();
    error.innerText = err.detail?.message || err.detail;
    return;
  }

  const words = await res.json();

  wordsCache[levelId] = words; // cache per level

  renderWords(words);
}

function renderWords(words) {
  wordSelect.innerHTML = "";
  wordImage.style.display = "none";

  words.forEach(w => {
    const o = document.createElement("option");
    o.value = w.word_id || w.id;
    o.textContent = w.word || w.text;
    wordSelect.appendChild(o);
  });
}

function onWordSelected() {
  const word = wordSelect.selectedOptions[0]?.text;
  if (!word) return;

  wordImage.src = `${STATIC}/images/words/${word}.jpg`;
  wordImage.style.display = "block";
}

/* =========================
   🔊 TTS
========================= */

function playTTS() {
  const word = wordSelect.selectedOptions[0]?.text;
  if (!word) return;

  const u = new SpeechSynthesisUtterance(word);
  u.rate =
    paceMode.value === "slow" ? 0.6 :
    paceMode.value === "fast" ? 1.1 :
    paceMode.value === "custom" ? customPace.value / 100 :
    0.85;

  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* =========================
   🎤 STT
========================= */

function startSTT() {
  clearUI();

  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    error.innerText = "Speech recognition not supported.";
    return;
  }

  const expectedWord = wordSelect.selectedOptions[0]?.text || "";
  const listenTime = expectedWord.length <= 4 ? 3500 : 2500;

  const rec = new SpeechRecognition();
  rec.lang = "en-US";
  rec.continuous = false;
  rec.interimResults = false;
  rec.maxAlternatives = 3;

  output.innerText = "🎤 Listening…";

  rec.onresult = e => {
    const raw = e.results[0][0].transcript;
    const word = normalizeSpoken(raw);

    if (!word) {
      output.innerText = "Try again 🌱";
      return;
    }

    spokenText = word;
    output.innerText = `👂 I heard: "${spokenText}"`;
  };

  rec.start();
  setTimeout(() => rec.stop(), listenTime);
}

/* =========================
   📊 EVALUATION
========================= */

async function evaluatePronunciation() {
  if (!spokenText) {
    error.innerText = "Please speak first.";
    return;
  }

  const expectedWord = wordSelect.selectedOptions[0].text;
  const levelId = levelSelect.value;
  const wordId = Number(wordSelect.value);

  const res = await fetch(`${API}/practice/evaluate`, {
    method: "POST",
    headers: { ...AUTH, "Content-Type": "application/json" },
    body: JSON.stringify({
      word_id: wordId,
      recognized_text: spokenText
    })
  });

  const result = await res.json();

  /* 🔥 UPDATE CACHE MASTERED STATUS */
  if (wordsCache[levelId]) {
    const w = wordsCache[levelId].find(x => x.id === wordId);
    if (w) {
      w.mastery_score = result.score;
      w.is_mastered = result.score >= 80;
    }
  }

  /* 🔥 OPTIONAL: refresh level mastery percentage */
  levelCache = null; // force reload next time

  const agg = await fetch(`${API}/feedback/aggregate`, {
    method: "POST",
    headers: { ...AUTH, "Content-Type": "application/json" },
    body: JSON.stringify({
      mode: "static",
      content_type: "word",
      text: expectedWord,
      spoken: spokenText,
      score: Number(result.score),
      attempts: result.attempts || 1
    })
  }).then(r => r.json());

  output.innerText =
`📘 Word: ${expectedWord}
🗣 You said: ${spokenText}
📊 Score: ${result.score}%

🧠 Verdict: ${agg.feedback?.verdict}
💬 ${agg.feedback?.feedback?.join("\n")}`;
}
</script>

</body>
</html>
